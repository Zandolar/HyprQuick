$mainMod = SUPER

# Laptop controls
bind =, XF86MonBrightnessUp, exec, brightnessctl set +5%
bind =, XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind =, XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# System Controls
bind = $mainMod, Q, killactive,
bind = $mainMod, Z, fullscreen, 1
bind = $mainMod SHIFT, Z, fullscreen
bindl=,switch:Lid Switch, exec, /home/matt/.local/share/quickshell-lockscreen/lock.sh
bind = $mainMod, KP_Add, exec, /home/matt/.local/share/quickshell-lockscreen/lock.sh
bind = $mainMod, TAB, exec, ~/.config/rofi/applets/bin/powermenu.sh
bind = $mainMod, D, exec, rofi -show drun
bind = ALT, TAB, exec, rofi -show window
bind = $mainMod, B, exec, ~/.config/quickshell/hyprquickpaper/wallpaper-switcher.sh
bind = , print, exec, hyprshot -m region -o "home/matt/Pictures/Screenshots"
bind = $mainMod, print, exec, hyprshot -m window -o "home/matt/Pictures/Screenshots"

# Hyprland control bindings
# Move active focus in current workspace with mainMod shift + arrow keys
bind = $mainMod SHIFT, left, layoutmsg, swapcol l
bind = $mainMod SHIFT, right, layoutmsg, swapcol r
bind = $mainMod SHIFT, up , movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize/Organise Windows
bind = $mainMod, period, layoutmsg, colresize +conf
bind = $mainMod, comma, layoutmsg, colresize -conf

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r

# Switch workspaces
bind = $mainMod, up, workspace, m-1
bind = $mainMod, down, workspace, m+1
bind = $mainMod SHIFT, up, workspace, -1
bind = $mainMod SHIFT, down, workspace, +1
bind = $mainMod, slash, workspace, previous

# Focus Monitor and move windows between monitors
bind = $mainMod, J, focusmonitor, HDMI-A-1
bind = $mainMod, K, focusmonitor, eDP-1
bind = $mainMod, H, movewindow, mon:HDMI-A-1
bind = $mainMod, L, movewindow, mon:eDP-1
bind = $mainMod SHIFT, J, movecurrentworkspacetomonitor, HDMI-A-1 
bind = $mainMod SHIFT, K, movecurrentworkspacetomonitor, eDP-1

# Workspace Bindings
# Switch Workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Toggle Special Workspaces
bind = $mainMod, S, togglespecialworkspace, misc
bind = $mainMod, C, togglespecialworkspace, kitty
bind = $mainMod, X, togglespecialworkspace, dolphin
bind = $mainMod, A, togglespecialworkspace, audio
bind = $mainMod, F, togglespecialworkspace, browser

# Scratchpad Bindings
bind = $mainMod, Return, exec, pypr toggle term
bind = $mainMod, KP_Left, exec, pypr toggle btman
bind = $mainMod, KP_Begin, exec, pypr toggle network
bind = $mainMod, KP_Right, exec, pypr toggle volume
bind = $mainMod, KP_End, exec, pypr toggle qt6
bind = $mainMod, KP_Down, exec, pypr toggle qt5
bind = $mainMod, KP_Next, exec, pypr toggle nwg

# Group Control
bind = $mainMod, O, togglegroup
bind = $mainMod, U, changegroupactive, b
bind = $mainMod, I, changegroupactive, f

# Program Binds
bind = $mainMod, W, exec, app.zen_browser.Zen
bind = $mainMod, E, exec, emacs

# Special Workspace Launching
bind = $mainMod SHIFT, X, exec, [workspace special:dolphin] pcmanfm-qt
bind = $mainMod SHIFT, C, exec, [workspace special:kitty] kitty
bind = $mainMod SHIFT, A, exec, [workspace special:audio] com.plexamp.Plexamp
bind = $mainMod SHIFT, F, exec, [workspace special:browser] firefox

