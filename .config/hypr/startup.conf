## Programs executed at startup
exec-once=dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY
exec-once = pypr
exec-once = systemctl --user start hyprpolkitagent
exec-once = swww-daemon
exec-once = quickshell
exec-once = swaync
exec-once = hypridle
exec-once = [workspace 1] app.zen_browser.zen
exec-once = [silent] com.parsecgaming.parsec
exec-once = [silent] discord
exec-once = [silent] krusader
exec-once = [silent] librewolf
exec-once = [silent] chromium
exec-once = [silent] codium
exec-once = [silent] claude-desktop
exec-once = [workspace special:dolphin silent] pcmanfm-qt
exec-once = [workspace special:kitty silent] kitty
exec-once = [workspace special:browser silent] firefox
exec-once = hyprctl setcursor Nordzy-cursors 28
exec-once = brightnessctl set 50%
exec-once = pactl set-sink-volume @DEFAULT_SINK@ 100%
exec-once = sudo mount -a

