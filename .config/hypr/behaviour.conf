group {
    auto_group = true
    insert_after_current = true
    focus_removed_window = true
    drag_into_group = 1
    merge_groups_on_drag = true
    merge_groups_on_groupbar = true
    merge_floated_into_tiled_on_groupbar = true
    group_on_movetoworkspace = true
    col.border_active = $inverse_primary
    col.border_inactive = $surface_container
    col.border_locked_active = $primary_fixed_dim
    col.border_locked_inactive = $surface_container_highest

    groupbar {
        enabled = true
        font_family = sans
        font_size = 9
        font_weight_active = bold
        font_weight_inactive = normal
        gradients = true
        height = 14
        indicator_gap = 2
        indicator_height = 3
        stacked = false
        priority = 3
        render_titles = true
        text_offset = 0
        text_padding = 0
        scrolling = true
        rounding = 2
        rounding_power = 4.0
        gradient_rounding = 2
        gradient_rounding_power = 4.0
        round_only_edges = true
        gradient_round_only_edges = true
        text_color = $secondary_fixed
        text_color_inactive = $secondary_fixed_dim
        text_color_locked_active = $primary_fixed 
        text_color_locked_inactive = $primary_fixed_dim
        col.active = $on_secondary_fixed
        col.inactive = $surface
        col.locked_active = $on_primary_fixed
        col.locked_inactive = $surface_variant
        gaps_in = 2
        gaps_out = 2
        keep_upper_gap = true
        blur = true
    }

}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = false
    col.splash = $surface_bright
    font_family = CaskaydiaCove Mono Nerd Font
    splash_font_family = CaskaydiaCove Mono Nerd Font
    force_default_wallpaper = 0
    vfr = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    name_vk_after_proc = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    disable_autoreload = false
    enable_swallow = false
    swallow_regex =
    swallow_exception_regex = 
    focus_on_activate = false
    mouse_move_focuses_monitor = true
    allow_session_lock_restore = false
    session_lock_xray = false
    background_color = $source_color
    close_special_on_empty = true
    on_focus_under_fullscreen = 0
    exit_window_retains_fullscreen = false
    initial_workspace_tracking = 1
    middle_click_paste = true
    render_unfocused_fps = 15
    #disable_xgd_env_checks = false
    #disable_hyprland_qtutils_check = false
    lockdead_screen_delay = 1000
    #enable_anr_dialogue = true
    anr_missed_pings = 5
    size_limits_tiled = false
    disable_watchdog_warning = false
}

binds {
    pass_mouse_when_bound = false
    scroll_event_delay = 300
    workspace_back_and_forth = false
    hide_special_on_workspace_change = true
    allow_workspace_cycles = true
    workspace_center_on = 0
    focus_preferred_method = 1
    ignore_group_lock = false
    movefocus_cycles_fullscreen = false
    movefocus_cycles_groupfirst = true
    window_direction_monitor_fallback = true
    disable_keybind_grabbing = false
    allow_pin_fullscreen = true
    drag_threshold = 0
}

xwayland {
    enabled = true
    #use_nearest_neighbour = false
    force_zero_scaling = false
    create_abstract_socket = false
}

opengl {
    nvidia_anti_flicker = true
}

render {
    direct_scanout = 2
    expand_undersized_textures = true
    xp_mode = false
    ctm_animation = 1
    cm_fs_passthrough = 1
    cm_enabled = true
    send_content_type = true
    cm_auto_hdr = 0
    new_render_scheduling = true
    non_shader_cm = 3
    cm_sdr_eotf = 2
    commit_timing_enabled = true
}

cursor {
    invisible = false
    sync_gsettings_theme = true
    no_hardware_cursors = 2
    no_break_fs_vrr = 2
    min_refresh_rate = 30
    hotspot_padding = 0
    inactive_timeout = 10
    no_warps = false
    persistent_warps = false
    warp_on_change_workspace = 1
    warp_on_toggle_special = 1
    default_monitor =
    zoom_factor = 1.0
    zoom_rigid = false
    zoom_detached_camera = true
    enable_hyprcursor = true
    hide_on_key_press = true
    hide_on_touch = true
    hide_on_tablet = true
    use_cpu_buffer = 1
    warp_back_after_non_mouse_input = true
    zoom_disable_aa = false
}

ecosystem {
    no_update_news = false
    no_donation_nag = true
    enforce_permissions = false
}

quirks {
    prefer_hdr = 1
}

debug {

}