# Hyprland Variables
env = HYPRLAND_TRACE=0
env = HYPRLAND_NO_RT=0
env = HYPRLAND_NO_SD_NOTIFY=0
env = HYPRLAND_NO_SD_VARS=0

# Aquamarine Variables
env = AQ_TRACE=0
env = AQ_DRM_DEVICES=0
env = AQ_FORCE_LINEAR_BLIT=0
env = AQ_MGPU_NO_EXPLICIT=0
env = AQ_NO_MODIFIERS=0

# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# XDG Variables
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT Variables
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,0
#env = QT_PLUGIN_PATH,/usr/lib/qt/plugins

# Theming Variables
#env = GTK_THEME
env = XCURSOR_THEME,Nordzy-cursors
#env = XCURSOR_SIZE

# Misc Variables
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = _JAVA_AWT_WM_NONREPARENTING,1
env = MOZ_ENABLE_WAYLAND,1
env = HYPRSHOT_DIR,home/matt/Pictures/Screenshots
env = QS_NO_RELOAD_POPUP,1