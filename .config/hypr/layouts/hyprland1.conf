#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1920x1080@60,1920x2160,1
monitor=HDMI-A-1,3840x2160@60,0x0,1.00
# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Import Pywal colours
source = ~/.cache/wal/colors-hyprland.conf

# Environment variables
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XCURSOR_THEME,Nordzy-cursors
env = HYPRSHOT_DIR,home/matt/Pictures/Screenshots
env = QT_PLUGIN_PATH,/usr/lib/qt/plugins
env = MOZ_ENABLE_WAYLAND,1
#env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = CLUTTER_BACKEND,wayland


# Execute your favorite apps at launch
exec-once=dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY
exec-once = pypr
exec-once = swaybg --image ~/Pictures/Wallpapers/Wallpaper/*.jpg --mode fill
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = [silent] krusader
exec-once = [silent] io.github.zen_browser.zen
exec-once = [silent] discord
exec-once = [workspace special:browser silent] microsoft-edge-beta
exec-once = [silent] com.parsecgaming.parsec
exec-once = [silent] chromium
exec-once = [workspace special:kitty silent] kitty
#exec-once = [workspace special:dolphin silent] dolphin
exec-once = [workspace special:dolphin silent] pcmanfm-qt
exec-once = [workspace 1] firefox
exec-once = [silent] librewolf
exec-once = hyprctl setcursor Nordzy-cursors 28
exec = /usr/lib/polkit-kde-authentication-agent-1
exec-once = brightnessctl set 50%
exec-once = pactl set-sink-volume @DEFAULT_SINK@ 100%
exec-once = [silent] emacs
exec-once = sudo mount -a
exec-once = ~/Arch-Hyprland/pywalstartup.sh

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 10
    gaps_out = 8
    border_size = 4
    col.active_border = $color7 $color5 $color7 $color5 75deg
    col.inactive_border = $color9
    #cursor_inactive_timeout = 0
    layout = master
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    rounding_power = 4.0
    #drop_shadow = yes
    #shadow_range = 6
    #shadow_render_power = 3
    #col.shadow = rgba(1a1a1aee)
    dim_modal = true
    dim_inactive = false
    dim_strength = 0.3
    dim_around = 0.8
    layerrule = match:namespace rofi, blur on
    layerrule = match:namespace rofi, dim_around on

    blur {
         enabled = yes
         size = 6
         passes = 4
         new_optimizations = on
         brightness = 1.0
         contrast = 1.1
         special = true
         vibrancy = 0.9
         vibrancy_darkness = 0.2
         popups = true
         }
}

animations {
    enabled = yes
    #first_launch_animation = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 12, default, gnomed
    animation = windowsOut, 1, 12, default, slide
    animation = windowsMove, 1, 12, default, slide
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 10, default, slide
    animation = specialWorkspace,1,10,default,slidevert
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    #new_is_master = false
    new_on_top = true
    special_scale_factor = 0.9
    mfact = 0.6
    #no_gaps_when_only = 0
    #orientation = center
    #always_center_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    #workspace_swipe = true
    #workspace_swipe_fingers = 2
}

misc {
    disable_hyprland_logo = true
}

#Workspace Rules
workspace = special:kitty, gapsout:100
workspace = special:browser, gapsout:50
workspace = special:audio, gapsout:200
workspace = special:dolphin, gapsout:100
workspace = special:misc, gapsout:80

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device:epic mouse V1 {
#    sensitivity = -0.5
#}
# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

#Layer rules
#layerrule = blur, rofi
#layerrule = animation[fade], rofi

#General rules
#windowrule = float,class: ^(org.kde.polkit-kde-authentication-agent-1)$,title:^(Authentication Required — PolicyKit1 KDE Agent)$
windowrule = match:class kitty, opacity 0.8 0.6
windowrule = match:class Emacs, workspace 8
windowrule = match:class Emacs, opacity 0.75 0.75
#windowrulev2 = idleinhibit fullscreen, firefox
#windowrule = match:class org.kde.dolphin, match:title Copying - Dolphin, minsize 555 230
#windowrulev2 = center,class:^(org.kde.dolphin)$,title:^(Copying - Dolphin)$
windowrule = match:class Conky, float 1
windowrule = match:class org.kde.kdenlive, match:title Rendering - Kdenlive, center 1
windowrule = match:class org.freedesktop.impl.portal.desktop.kdeworkspace special:picker
#windowrulev2 = float,class:^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = match:class org.kde.kdenlive, match:title Rendering - Kdenlive, size 1150 767
windowrule = match:class org.kde.krusader, opacity 0.70 0.6
windowrule = match:class zenity, float 1
#blurls = rofi
#windowrulev2 = stayfocused,class:^(__main__.py)$,title:^(Theme Export Options)$
#windowrulev2 = focusonactivate,class:^(__main__.py)$,title:^(Theme Export Options)$
#windowrulev2 = float,class:^(__main__.py)$,title:^(Theme Export Options)$

#Drop down terminal
#windowrulev2 = float,class: ^(Alacritty)$
#windowrulev2 = move 2 31,class: ^(Alacritty)$
#windowrulev2 = size 99.9% 0%,class: ^(Alacritty)$
#windowrulev2 = noborder,class: ^(Alacritty)$
#windowrulev2 = opacity 0 0,class: ^(Alacritty)$

# Waybar rules
windowrule = match:class pavucontrol-qt, float 1
#windowrule = match:class pavucontrol-qt, maxsize 943 1000
#windowrulev2 = noborder,class: ^(pavucontrol-qt)$
#windowrulev2 = center,class: ^(pavucontrol-qt)$
windowrule = match:class nm-connection-editor, float 1
#windowrulev2 = minsize 650 800,class: ^(nm-connection-editor)$
#windowrule = match class: nm-connection-editor, center 1

# Files tab
windowrule = match:class org.kde.krusader, workspace 7 silent
#windowrule = match:class org.kde.krusader, noinitialfocus 1
#windowrule = match:class org.kde.krusader, noanim 1

#Mail Tab
windowrule = match:class zen, workspace 9
windowrule = match:class zen, opacity 0.9
#windowrulev2 = tile,class:^(Vivaldi-stable)$
#windowrulev2 = float,class:^(Vivaldi-stable)$,title:^(Vivaldi Settings: General - Vivaldi)$
#windowrulev2 = size 40% 60%,class:^(Vivaldi-stable)$,title:^(Vivaldi Settings: General - Vivaldi)$
#windowrulev2 = center,class:^(Vivaldi-stable)$,title:^(Vivaldi Settings: General - Vivaldi)$
#windowrulev2 = opacity 1,class:^(Vivaldi-stable)$,title:^(Vivaldi Settings: General - Vivaldi)$

#Gaming Tab
windowrule = match:class discord, workspace 10
windowrule = match:class discord, opacity 0.8
windowrule = match:class lutris, workspace 10
windowrule = match:class Steam, workspace 10
windowrule = match:class Steam, opacity 0.9
windowrule = match:class Steam, match:title Friends List, float 1
windowrule = match:class Steam, match:title Steam - News, float 1
windowrule = match:class Steam, match:title Steam - News, center 1

#Books Tab
windowrule = match:class com.github.babluboy.bookworm, workspace 11

#Music Tab
windowrule = match:class org.nicotine_plus.Nicotine, workspace 12
windowrule = match:class org.nicotine_plus.Nicotine, opacity 0.8 0.5
windowrule = match:class audacious, workspace 12
windowrule = match:class audacious, opacity 0.9 10

#Media Tab
windowrule = match:class librewolf, workspace 13
windowrule = match:class librewolf, opacity 0.9 0.6
#windowrule = idleinhibit fullscreen, chromium
windowrule = match:class firefox, opacity 0.95 0.95
windowrule = match:class firefox, match:title Library, float 1
windowrule = match:class firefox, match:title Library, opacity 1 1
windowrule = match:class firefox, match:title Library, move 68.6% 12%
windowrule = match:class firefox, match:title Library, size 583 544
windowrule = match:class setup.tmp, workspace 8
windowrule = match:class com.github.iwalton3.jellyfin-media-player, workspace 14
windowrule = match:class com.github.iwalton3.jellyfin-media-player, maximize 1
#windowrule = idleinhibit fullscreen, org.jellyfin.jellyfinmediaplayer
windowrule = match:class Plex, workspace 14
windowrule = match:class transmission-qt, workspace 13
windowrule = match:class transmission-qt, opacity 0.65 0.5
windowrule = match:class Sonixd, opacity 0.85 0.85

#VirtualMachines
windowrule = match:class virt-manager, workspace 15
windowrule = match:class virt-manager, match:title New VM, size 600 500
windowrule = match:class parsecd, workspace 15
windowrule = match:class chromium, workspace 17
windowrule = match:class remote-viewer, workspace 16

#Special Workspaces
windowrule = match:class font-manager, workspace special:misc
windowrule = match:class Microsoft-edge-beta, workspace special:browser
#windowrulev2 = workspace special:dolphin silent,class:^(org.kde.dolphin)$
windowrule = match:class pcmanfm-qt, workspace special:dolphin silent
#windowrulev2 = noanim,class:^(org.kde.dolphin)$
#windowrule = match:class pcmanfm-qt, noanim 1
#windowrulev2 = opacity 0.8 0.65,class:^(org.kde.dolphin)$
windowrule = match:class pcmanfm-qt, opacity 0.8 0.65

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# System controls
bind = $mainMod, Q, killactive,
bind = $mainMod, KP_Right, exec, pypr toggle volume
bind = $mainMod, KP_End, exec, pypr toggle qt6
bind = $mainMod, KP_Down, exec, pypr toggle qt5
bind = $mainMod, KP_Left, exec, pypr toggle btman
bind = $mainMod, KP_Next, exec, pypr toggle nwg
bind = $mainMod, KP_Begin, exec, pypr toggle network
bind = $mainMod, KP_Insert, exec, pypr toggle themix
bind = $mainMod, KP_Home, exec, ~/Arch-Hyprland/krusader.sh
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, Z, fullscreen, 1
bind = $mainMod SHIFT, Z, fullscreen
#bind = $mainMod, O, toggleopaque
bind = $mainMod, TAB, exec, ~/.config/rofi/applets/bin/powermenu.sh
bind = $mainMod, print, exec, hyprshot -m window
bind = , print, exec, hyprshot -m region -o "home/matt/Pictures/Screenshots"
#bind = ALT, X, exec, archlinux-logout
bind = $mainMod, KP_Add, exec, hyprlock
bindl=,switch:Lid Switch, exec, hyprlock
bind = $mainMod, KP_Subtract, exec, sh ~/Arch-Hyprland/NSoff.sh
bind = $mainMod SHIFT, KP_Subtract, exec, sh ~/Arch-Hyprland/NSon.sh
bind = $mainMod SHIFT, KP_Insert, exec, swaybg --image ~/Pictures/Wallpapers/meteors.jpg --mode fill
bind = $mainMod, P, exec, hyprpicker -a -f hex


# Program binds
bind = $mainMod, Return, exec, pypr toggle term
bind = $mainMod SHIFT, C, exec, [workspace special:kitty] kitty
bind = $mainMod, W, exec, firefox
bind = $mainMod ALT, W, exec, chromium
bind = $mainMod SHIFT, Return, exec, ~/Arch-Hyprland/kitty.sh
#bind = $mainMod SHIFT, X, exec, [workspace special:dolphin] dolphin
bind = $mainMod SHIFT, X, exec, [workspace special:dolphin] pcmanfm-qt
bind = $mainMod, B, exec, ~/Arch-Hyprland/switcher.sh
bind = $mainMod CTRL, B, exec, ~/Arch-Hyprland/pywal.sh
bind = $mainMod SHIFT, B, exec, ~/Arch-Hyprland/altpywal.sh
bind = $mainMod ALT, B, exec, ~/Arch-Hyprland/lightpywal.sh
bind = $mainMod, KP_Prior, exec, ~/Arch-Hyprland/waybar.sh
#bind = $mainMod, D, exec, sirula
#bind = $mainMod, A, exec, pypr toggle plexamp
bind = $mainMod SHIFT, A, exec, [workspace special:audio] com.plexamp.Plexamp
bind = $mainMod, E, exec, emacs
bind = $mainMod SHIFT, F, exec, [workspace special:browser] microsoft-edge-beta
#bind = $mainMod, D, exec, /home/matt/.config/rofi/launchers/type-1/launcher.sh
bind = $mainMod, D, exec, rofi -show drun
#bind = ALT, TAB, exec, /home/matt/.config/rofi/launchers/type-1/launcher1.sh
bind = ALT, TAB, exec, rofi -show window
bind = ALT SHIFT, C, exec, wl-color-picker

#Drop down terminal
bind = $mainMod, T, resizewindowpixel, exact 1918 450,^(Alacritty)$
bind = $mainMod, T, focuswindow,^(Alacritty)$
#bind = $mainMod, T, hyprctl setprop alpha, 0.9,^(Alacritty)$
bind = $mainMod SHIFT, T, resizewindowpixel, exact 1918 0,^(Alacritty)$
bind = $mainMod SHIFT, T, focuswindow,^(Alacritty)$

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
#bind = $mainMod, P, pin
#bind = $mainMod, P, focuscurrentorlast
#bind = $mainMod, P, movewindow, l

# Laptop special key bindings
bind =, XF86MonBrightnessDown, exec, brightnessctl set 13-
bind =, XF86MonBrightnessUp, exec, brightnessctl set +13
binde =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind =, XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Move active focus in current workspace with mainMod shift + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up , movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize/Organise Windows
binde = $mainMod SHIFT, L, resizeactive, 10 0
binde = $mainMod SHIFT, H, resizeactive, -10 0
binde = $mainMod SHIFT, K, splitratio, exact 0.6
binde = $mainMod SHIFT, J, splitratio, exact 0.5
bind = $mainMod, M, layoutmsg, addmaster
bind = $mainMod, N, layoutmsg, removemaster
bind = $mainMod, V, togglefloating
bind = $mainMod ALT, left, layoutmsg, orientationleft
bind = $mainMod ALT, right, layoutmsg, orientationright
bind = $mainMod ALT, up, layoutmsg, orientationtop
bind = $mainMod ALT, down, layoutmsg, orientationbottom
bind = $mainMod ALT, slash, layoutmsg, orientationcenter
#bind = $mainMod, P, resizeactive, exact 960 1030
#bind = $mainMod, P, moveactive, exact 2400 40
bind = $mainMod, bracketleft, resizeactive, 0 -40
bind = $mainMod, bracketright, resizeactive, 0 40

# Switch workspaces
bind = $mainMod, comma, workspace, m-1
bind = $mainMod, period, workspace, m+1
bind = $mainMod SHIFT, comma, workspace, -1
bind = $mainMod SHIFT, period, workspace, +1
bind = $mainMod, slash, workspace, previous

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, S, togglespecialworkspace, misc
bind = $mainMod, C, togglespecialworkspace, kitty
bind = $mainMod, X, togglespecialworkspace, dolphin
bind = $mainMod, A, togglespecialworkspace, audio
bind = $mainMod, F, togglespecialworkspace, browser
bind = $mainMod, H, togglespecialworkspace, picker

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, S, exec, pypr toggle_special misc

# Focus Monitor and move windows between monitors
bind = $mainMod, J, focusmonitor, HDMI-A-1
bind = $mainMod, K, focusmonitor, eDP-1
bind = $mainMod, H, movewindow, mon:HDMI-A-1
bind = $mainMod, L, movewindow, mon:eDP-1
bind = $mainMod, U, movecurrentworkspacetomonitor, HDMI-A-1 
bind = $mainMod, I, movecurrentworkspacetomonitor, eDP-1

# Group Control
bind = $mainMod, G, togglegroup
bind = $mainMod, T, changegroupactive, b
bind = $mainMod, Y, changegroupactive, f
#bind = $mainMod SHIFT, G, lockgroups, toggle
#bind = $mainMod SHIFT, T, moveintogroup, l
#bind = $mainMod SHIFT, U, moveintogroup, r

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
