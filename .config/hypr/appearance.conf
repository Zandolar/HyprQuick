## General Settings
general {

    gaps_in = 10
    gaps_out = 8
    float_gaps = 0
    border_size = 4
    gaps_workspaces = 0
    col.active_border = $secondary $primary $on_surface_variant $inverse_primary 75deg
    col.inactive_border = $surface_variant
    col.nogroup_border = $tertiary_fixed_dim
    col.nogroup_border_active = $tertiary_fixed
    no_focus_fallback = true
    resize_on_border = false
    extend_border_grab_area = 15
    hover_icon_on_border = true
    resize_corner = 0
    modal_parent_blocking = true
    allow_tearing = false


    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 10
        border_overlap = true
        respect_gaps = true
    }
}

# Visual settings for window decoration
decoration {
    rounding = 10
    rounding_power = 4.0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    dim_modal = true
    dim_inactive = false
    dim_strength = 0.5
    dim_special = 0.2
    dim_around = 0.8
    screen_shader =
    border_part_of_window = true

    blur {
        enabled = true
        size = 6
        passes = 4
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.0
        contrast = 2.0
        brightness = 1.5
        vibrancy = 1.0
        vibrancy_darkness = 0.2
        special = true
        popups = true
        popups_ignorealpha = 0.0
        input_methods = true
        input_methods_ignorealpha = 0.0
    }

    shadow {
        enabled = true
        range = 4
        render_power = 2
        sharp = false
        ignore_window = true
        color = $shadow
        color_inactive = $surface_container_lowest
        offset = 0, 0
        scale = 1.0
    }

    glow {
        #enabled = false
        #range = 0
        #render_power = 1
        #color = $surface_dim
        #color_inactive = $surface_container_highest
    }
}

animations {
    enabled = true
    workspace_wraparound = false
}




